<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecty | Community Feed</title>
    <meta name="description" content="Browse community posts from every district. Sign in to share your own ideas.">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        /* ── Filter buttons ─────────────────────────── */
        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border-color: transparent;
        }

        /* ── Like button ────────────────────────────── */
        .like-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.85rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .like-btn:hover {
            border-color: #f43f5e;
            color: #f43f5e;
            background: rgba(244,63,94,0.08);
            transform: scale(1.04);
        }
        .like-btn.liked {
            border-color: #f43f5e;
            color: #f43f5e;
            background: rgba(244,63,94,0.12);
        }
        .like-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Image upload area ──────────────────────── */
        .upload-area {
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .upload-area:hover, .upload-area.drag-over {
            border-color: var(--primary);
            background: rgba(99,102,241,0.05);
        }
        .upload-area input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }
        #upload-preview { display: none; }
        #preview-img { max-width: 100%; max-height: 180px; border-radius: 8px; object-fit: cover; }
        .remove-img-btn {
            display: inline-block; margin-top: 0.5rem; color: #f43f5e;
            background: none; border: none; cursor: pointer; font-size: 0.8rem;
            text-decoration: underline; font-family: inherit;
        }
        .upload-progress {
            height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px;
            margin-top: 0.75rem; overflow: hidden; display: none;
        }
        .upload-progress-bar {
            height: 100%; background: var(--primary); border-radius: 4px;
            transition: width 0.3s; width: 0%;
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <nav class="navbar container flex justify-between items-center" style="background: rgba(5,5,5,0.8); backdrop-filter: blur(12px);">
        <a href="dashboard.html" class="brand-text text-gradient-primary">Connecty</a>

        <!-- Guest nav -->
        <div id="nav-guest" class="flex items-center gap-3">
            <a href="index.html" class="btn btn-primary" style="padding: 0.5rem 1.25rem;">
                Sign In to Post
            </a>
        </div>

        <!-- Logged-in nav -->
        <div id="nav-user" class="hidden flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="avatar" id="nav-avatar"></div>
                <span id="nav-username" class="font-bold text-sm"></span>
            </div>
            <a href="admin.html" id="admin-link" class="btn btn-secondary hidden"
               style="padding:0.5rem 1rem; border-color:var(--primary); color:var(--primary);">
                Admin Panel
            </a>
            <button id="create-post-btn" class="btn btn-primary" style="padding:0.5rem 1rem;">
                + Create Post
            </button>
            <button id="logout-btn" class="btn btn-secondary" style="padding:0.5rem 1rem;">
                Logout
            </button>
        </div>
    </nav>

    <main class="container mt-8 mb-8" style="flex: 1;">
        <div class="dashboard-layout">

            <!-- Sidebar -->
            <aside class="glass glass-card flex-col gap-4 sticky" style="top:100px; height:max-content;">
                <h3 class="text-xl font-bold mb-4">Discover</h3>
                <div class="flex flex-col gap-2" id="district-filters">
                    <button class="btn btn-secondary filter-btn active w-full" style="justify-content:flex-start;" data-district="All">Global Feed</button>
                    <button class="btn btn-secondary filter-btn w-full" style="justify-content:flex-start;" data-district="North District">North District</button>
                    <button class="btn btn-secondary filter-btn w-full" style="justify-content:flex-start;" data-district="South District">South District</button>
                    <button class="btn btn-secondary filter-btn w-full" style="justify-content:flex-start;" data-district="East District">East District</button>
                    <button class="btn btn-secondary filter-btn w-full" style="justify-content:flex-start;" data-district="West District">West District</button>
                </div>
            </aside>

            <!-- Feed -->
            <section class="flex flex-col gap-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold" id="feed-title">Global Feed</h2>
                </div>
                <div id="posts-container" class="flex flex-col gap-6">
                    <div class="text-center mt-8"><span class="spinner"></span></div>
                </div>
            </section>
        </div>
    </main>

    <!-- Create Post Modal -->
    <div id="create-modal" class="modal-overlay">
        <div class="glass glass-card modal-content p-6">
            <h2 class="text-2xl font-bold mb-6 text-gradient">Create New Post</h2>

            <div class="form-group">
                <label class="form-label">What's on your mind?</label>
                <textarea id="post-content" class="form-input" rows="4"
                    placeholder="Share your idea with the community..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Image (Optional)</label>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="post-image-file" accept="image/jpeg,image/png,image/gif,image/webp">
                    <div id="upload-placeholder">
                        <div style="font-size:2rem; margin-bottom:0.5rem;">📷</div>
                        <p style="color:var(--text-muted); font-size:0.9rem;">Click or drag an image here</p>
                        <p style="color:var(--text-muted); font-size:0.75rem; margin-top:0.25rem;">JPG, PNG, GIF, WebP · Max 5MB</p>
                    </div>
                    <div id="upload-preview">
                        <img id="preview-img" alt="Preview">
                        <br>
                        <button class="remove-img-btn" id="remove-img-btn" type="button">✕ Remove image</button>
                    </div>
                </div>
                <div class="upload-progress" id="upload-progress">
                    <div class="upload-progress-bar" id="upload-progress-bar"></div>
                </div>
            </div>

            <div class="flex gap-4 mt-6">
                <button id="cancel-post-btn" class="btn btn-secondary w-full">Cancel</button>
                <button id="submit-post-btn" class="btn btn-primary w-full">Post</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
